# NinniTales — daily Shorts: publish staged scraped + generated anime → schedule
# across US evening slots → Telegram veto previews.
#
# daily.py fills 4 slots (noon/3/6/9pm ET): first it publishes any scraped Shorts the
# LOCAL scraper staged in pending/ (cloud can't scrape — datacenter IP), then generates
# anime Shorts to top up. Each is uploaded PRIVATE with publishAt, previewed to Telegram
# (❌ delete / 🔄 rebuild via ninnitales-telegram-poll.yml). Runs 14:00 UTC (10am ET),
# ~30 min after the local scrape job (com.ninnitales.scrape.plist) pushes pending/.
#
# Required repo secrets:
#   YOUTUBE_CLIENT_ID_NINNITALES / _SECRET_NINNITALES / _REFRESH_TOKEN_NINNITALES
#     (refresh token must have youtube.force-ssl — re-mint with get_youtube_token.py)
#   AZURE_OPENAI_* + NINNITALES_IMAGE_*   (generated-hook image + copy)
#   TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID (reused from AssuredReferral)

name: NinniTales Daily

on:
  schedule:
    # 14:00 UTC = 10am ET — build now, publish at 7pm ET, ~9h veto window between.
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  drip:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit the ledger back
    defaults:
      run:
        working-directory: ninnitales-shorts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system + python deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          python -m pip install --upgrade pip -r requirements.txt

      - name: Publish staged + generate the rest + Telegram previews
        env:
          YOUTUBE_CLIENT_ID_NINNITALES: ${{ secrets.YOUTUBE_CLIENT_ID_NINNITALES }}
          YOUTUBE_CLIENT_SECRET_NINNITALES: ${{ secrets.YOUTUBE_CLIENT_SECRET_NINNITALES }}
          YOUTUBE_REFRESH_TOKEN_NINNITALES: ${{ secrets.YOUTUBE_REFRESH_TOKEN_NINNITALES }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          NINNITALES_IMAGE_DEPLOYMENT: ${{ secrets.NINNITALES_IMAGE_DEPLOYMENT }}
          NINNITALES_IMAGE_ENDPOINT: ${{ secrets.NINNITALES_IMAGE_ENDPOINT }}
          NINNITALES_IMAGE_API_KEY: ${{ secrets.NINNITALES_IMAGE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Publishes pending/ scraped Shorts (staged locally) then tops up with generated.
        run: python daily.py --count 4 --source mix

      - name: Persist ledger + consumed pending
        if: always()
        run: |
          # Commit the ledger AND the removal of any pending/ clips we published.
          git add analytics/ledger.json pending/ 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(ninnitales): log scheduled Shorts + clear pending [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
