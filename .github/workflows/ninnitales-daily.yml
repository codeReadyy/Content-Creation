# NinniTales — daily Shorts: build 4 (2 scraped + 2 generated) → schedule across US
# evening slots → Telegram veto previews.
#
# daily.py builds 4 Shorts, uploads each PRIVATE with publishAt = a spread of US peak
# slots (noon/3/6/9pm ET), and sends Telegram previews with ❌/🔄 buttons. Ignore →
# it publishes; ❌ → deleted; 🔄 → rebuilt (ninnitales-telegram-poll.yml). Runs at
# 14:00 UTC (10am ET) so there's a veto window before the first slot.
#
# Required repo secrets:
#   YOUTUBE_CLIENT_ID_NINNITALES / _SECRET_NINNITALES / _REFRESH_TOKEN_NINNITALES
#     (refresh token must have youtube.force-ssl — re-mint with get_youtube_token.py)
#   AZURE_OPENAI_* + NINNITALES_IMAGE_*   (generated-hook image + copy)
#   TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID (reused from AssuredReferral)
# Optional:
#   YOUTUBE_COOKIES — cookies.txt body; helps scraping if YouTube blocks the runner IP.

name: NinniTales Daily

on:
  schedule:
    # 14:00 UTC = 10am ET — build now, publish at 7pm ET, ~9h veto window between.
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  drip:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # to commit the ledger back
    defaults:
      run:
        working-directory: ninnitales-shorts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system + python deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          python -m pip install --upgrade pip yt-dlp -r requirements.txt

      - name: Write cookies (optional, for scraping)
        if: ${{ secrets.YOUTUBE_COOKIES != '' }}
        run: printf '%s' "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt

      - name: Build + schedule + Telegram previews
        env:
          YOUTUBE_CLIENT_ID_NINNITALES: ${{ secrets.YOUTUBE_CLIENT_ID_NINNITALES }}
          YOUTUBE_CLIENT_SECRET_NINNITALES: ${{ secrets.YOUTUBE_CLIENT_SECRET_NINNITALES }}
          YOUTUBE_REFRESH_TOKEN_NINNITALES: ${{ secrets.YOUTUBE_REFRESH_TOKEN_NINNITALES }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          NINNITALES_IMAGE_DEPLOYMENT: ${{ secrets.NINNITALES_IMAGE_DEPLOYMENT }}
          NINNITALES_IMAGE_ENDPOINT: ${{ secrets.NINNITALES_IMAGE_ENDPOINT }}
          NINNITALES_IMAGE_API_KEY: ${{ secrets.NINNITALES_IMAGE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily.py --count 4 --source mix

      - name: Persist ledger
        if: always()
        run: |
          # ledger.json records the scheduled video so analyze + poll can find it.
          git add analytics/ledger.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(ninnitales): log scheduled Short to ledger [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
