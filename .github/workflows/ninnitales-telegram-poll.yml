# NinniTales — Telegram veto poller.
#
# GitHub Actions can't keep a bot running, so this polls Telegram for your ❌ taps
# on short intervals during the veto window (10am→7pm ET = 14:00→23:00 UTC). A tap
# deletes the scheduled Short via the YouTube API and marks it vetoed in the ledger.
#
# Cron note: GitHub's */N only spans the hour, so the windowed hours are listed
# explicitly. Outside the window there's nothing to veto, so we don't poll.
#
# Required repo secrets: YOUTUBE_*_NINNITALES (force-ssl token), TELEGRAM_BOT_TOKEN,
# TELEGRAM_CHAT_ID.

name: NinniTales Telegram Poll

on:
  schedule:
    - cron: "*/15 14-23 * * *"   # every 15 min, 14:00–23:00 UTC (10am–7pm ET)
  workflow_dispatch:

# Don't let overlapping runs double-process the same update cursor.
concurrency:
  group: ninnitales-telegram-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # commit the update offset + ledger back
    defaults:
      run:
        working-directory: ninnitales-shorts
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install poll deps
        run: python -m pip install --upgrade pip requests

      - name: Poll for vetoes
        id: poll
        env:
          YOUTUBE_CLIENT_ID_NINNITALES: ${{ secrets.YOUTUBE_CLIENT_ID_NINNITALES }}
          YOUTUBE_CLIENT_SECRET_NINNITALES: ${{ secrets.YOUTUBE_CLIENT_SECRET_NINNITALES }}
          YOUTUBE_REFRESH_TOKEN_NINNITALES: ${{ secrets.YOUTUBE_REFRESH_TOKEN_NINNITALES }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_poll.py

      # The two steps below ONLY run when you tapped "🔄 Cancel & make another",
      # so normal 15-min polls stay fast (no ffmpeg install, no build).
      - name: Install build deps (only when regenerating)
        if: steps.poll.outputs.regenerate == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg
          python -m pip install -r requirements.txt

      - name: Build a replacement Short
        if: steps.poll.outputs.regenerate == 'true'
        env:
          YOUTUBE_CLIENT_ID_NINNITALES: ${{ secrets.YOUTUBE_CLIENT_ID_NINNITALES }}
          YOUTUBE_CLIENT_SECRET_NINNITALES: ${{ secrets.YOUTUBE_CLIENT_SECRET_NINNITALES }}
          YOUTUBE_REFRESH_TOKEN_NINNITALES: ${{ secrets.YOUTUBE_REFRESH_TOKEN_NINNITALES }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          NINNITALES_IMAGE_DEPLOYMENT: ${{ secrets.NINNITALES_IMAGE_DEPLOYMENT }}
          NINNITALES_IMAGE_ENDPOINT: ${{ secrets.NINNITALES_IMAGE_ENDPOINT }}
          NINNITALES_IMAGE_API_KEY: ${{ secrets.NINNITALES_IMAGE_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily.py

      - name: Persist offset + ledger
        if: always()
        run: |
          git add analytics/tg_offset.json analytics/ledger.json 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "chore(ninnitales): telegram poll offset + vetoes [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
