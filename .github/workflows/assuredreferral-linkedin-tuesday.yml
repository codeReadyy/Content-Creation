# AssuredReferral — LinkedIn Weekly Post (Tuesday 10:00 AM IST)

name: AssuredReferral LinkedIn Tuesday

on:
  schedule:
    # 4:30 AM UTC = 10:00 AM IST, Tuesday only (day-of-week 2)
    - cron: "30 4 * * 2"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no publishing)"
        required: false
        type: boolean
        default: false

jobs:
  post:
    uses: ./.github/workflows/_pipeline.yml
    with:
      product: assuredreferral
      platforms: "linkedin"
      dry_run: ${{ inputs.dry_run || false }}
    secrets: inherit
