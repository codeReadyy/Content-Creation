# ============================================
# AssuredReferral AutoPoster — Daily GitHub Actions Pipeline
# ============================================
# Runs at 10:00 AM IST (4:30 AM UTC) every day for FREE.
# No server needed — GitHub runs it for you.
#
# SETUP:
# 1. Push this repo to GitHub (private repo is fine)
# 2. Go to: Settings → Secrets and variables → Actions → New repository secret
# 3. Add each secret listed in the 'env' block below
# 4. Go to: Actions tab → "Daily AutoPost" → Enable workflow
# 5. Done! It runs automatically. You can also click "Run workflow" to test.

name: Daily AutoPost

on:
  schedule:
    # 4:30 AM UTC = 10:00 AM IST
    - cron: '30 4 * * *'
  workflow_dispatch:  # Manual trigger button in GitHub UI

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: assured-referral-autoposter

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: assured-referral-autoposter/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-dejavu ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run the full pipeline
        env:
          # --- Azure OpenAI (REQUIRED) ---
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_CHAT_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}
          AZURE_OPENAI_IMAGE_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_IMAGE_DEPLOYMENT }}

          # --- Image Generation ---
          IMAGE_PROVIDER: ${{ secrets.IMAGE_PROVIDER }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}

          # --- Research Layer (OPTIONAL - falls back to defaults) ---
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}

          # --- LinkedIn ---
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}

          # --- YouTube ---
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}

          # --- Brand ---
          BRAND_NAME: AssuredReferral
          BRAND_URL: https://assuredreferral.com
        run: python main.py

      - name: Upload daily output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-output-${{ github.run_id }}
          path: assured-referral-autoposter/output/
          retention-days: 30
